name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read

jobs:
  # Publish the npm package (public). Verifies tag == package.json version.
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.15.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22.18.0'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check tag matches package.json version
        run: test "${GITHUB_REF_NAME}" = "v$(node -p "require('./package.json').version")"
      - run: pnpm build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Build, sign, notarize the macOS arm64 binary and attach it to the Release.
  # macOS runners are free on GitHub — this is what GitLab.com could not do.
  macos-binary:
    runs-on: macos-14 # arm64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.15.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22.18.0'
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Import Developer ID certificate
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN=build.keychain
          security create-keychain -p "" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          echo "$MACOS_CERT_P12" | base64 --decode > cert.p12
          security import cert.p12 -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN"
          rm -f cert.p12

      - name: Build, sign, notarize
        env:
          IRIS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          IRIS_NOTARY_APPLE_ID: ${{ secrets.APPLE_ID }}
          IRIS_NOTARY_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IRIS_NOTARY_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: pnpm build:sea:signed

      - name: Package binary
        run: ditto -c -k --keepParent dist-sea/iris dist-sea/iris-macos-arm64.zip

      - name: Upload macOS binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iris-macos-arm64
          path: dist-sea/iris-macos-arm64.zip

  # Build Linux x86_64 binary (no signing needed).
  linux-binary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.15.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22.18.0'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:sea
      - name: Package binary
        run: tar -czf dist-sea/iris-linux-x64.tar.gz -C dist-sea iris
      - name: Upload Linux binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iris-linux-x64
          path: dist-sea/iris-linux-x64.tar.gz

  # Build Linux arm64 binary (no signing needed).
  linux-arm64-binary:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.15.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22.18.0'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:sea
      - name: Package binary
        run: tar -czf dist-sea/iris-linux-arm64.tar.gz -C dist-sea iris
      - name: Upload Linux arm64 binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iris-linux-arm64
          path: dist-sea/iris-linux-arm64.tar.gz

  # Build Windows x86_64 binary (no signing).
  windows-binary:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.15.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22.18.0'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build SEA binary
        shell: bash
        run: sh scripts/build-sea.sh
      - name: Package binary
        shell: bash
        run: cd dist-sea && 7z a -tzip iris-windows-x64.zip iris.exe
      - name: Upload Windows binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iris-windows-x64
          path: dist-sea/iris-windows-x64.zip

  # Download all platform binaries and create a single GitHub Release.
  release:
    needs: [npm, macos-binary, linux-binary, linux-arm64-binary, windows-binary]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: |
            artifacts/iris-macos-arm64.zip
            artifacts/iris-linux-x64.tar.gz
            artifacts/iris-linux-arm64.tar.gz
            artifacts/iris-windows-x64.zip
          generate_release_notes: true
